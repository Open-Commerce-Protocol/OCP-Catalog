name: Documentation issue
description: Report missing, stale, or confusing docs.
title: "docs: "
labels:
  - documentation
body:
  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - README
        - Specs
        - Architecture docs
        - Integration docs
        - Site content
        - Agent guides
        - Examples
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing, stale, incorrect, or hard to understand?
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the affected documentation.
  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: What should the docs say or link to instead?
