map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name ocp.deeplumen.io;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ocp.deeplumen.io;

    # Replace with your real certificate paths, or let certbot fill these in.
    ssl_certificate /etc/letsencrypt/live/ocp.deeplumen.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ocp.deeplumen.io/privkey.pem;

    client_max_body_size 20m;

    # Normalize /demo to /demo/ so relative asset URLs resolve under /demo/
    location = /demo {
        return 301 /demo/$is_args$args;
    }

    location ^~ /demo/ {
        rewrite ^/demo/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4230;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /mcp {
        proxy_pass http://127.0.0.1:4300/mcp;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /mcp/ {
        proxy_pass http://127.0.0.1:4300/mcp/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route user-demo agent APIs directly to the user-demo service.
    location ^~ /api/user-demo/ {
        proxy_pass http://127.0.0.1:4230;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_send_timeout 190s;
        proxy_read_timeout 190s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Optional center API prefix. Requests like /api/center/ocp/catalogs/search
    # are rewritten to /ocp/catalogs/search on the center service.
    location /api/center/ {
        rewrite ^/api/center/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
