services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ocp-catalog-postgres
    environment:
      POSTGRES_USER: ocp
      POSTGRES_PASSWORD: ocp
      POSTGRES_DB: ocp_catalog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocp -d ocp_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ocp-catalog-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
