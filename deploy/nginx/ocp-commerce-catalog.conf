map $http_upgrade $connection_upgrade {
    default upgrade;
    '' '';
}

upstream ocp_commerce_catalog_api {
    least_conn;
    server 127.0.0.1:4000 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4001 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4002 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4003 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4004 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4005 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4006 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4007 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4008 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4009 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4010 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4011 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4012 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4013 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4014 max_fails=3 fail_timeout=10s;
    server 127.0.0.1:4015 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name ocp.commerce.pageflux.net;

    access_log /var/log/nginx/ocp-commerce-catalog.access.log;
    error_log /var/log/nginx/ocp-commerce-catalog.error.log;

    client_max_body_size 20m;

    location / {
        proxy_pass http://ocp_commerce_catalog_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
